<!DOCTYPE html>
<html lang="es-CO">
<head>

  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Los canales de la Membresía Básica de Tactical Trading: grupo de WhatsApp, canal de Telegram, soporte y la sesión de onboarding.">
  <title>Links Básica — Tactical Trading</title>

  <link rel="icon" href="/assets/logo-isotipo.webp" type="image/webp">

  <link rel="stylesheet" href="/assets/fonts/fonts.css">
  <link rel="stylesheet" href="/styles.css">

<!-- data-tier selecciona la entrada de CONFIG.tiers. Es la ÚNICA diferencia
     de fondo con premium.html: mismo diseño, distintos links. -->
<body class="pagina-links" data-tier="basica">

  <div class="links-fondo" aria-hidden="true"></div>

  <div class="links-envoltorio">

    <header class="links-header">
      <img class="header__logo" src="/assets/logo-lockup.webp" alt="Tactical Trading" width="42" height="40">
    </header>

    <main class="links-main">
      <section class="links-hero">
        <span class="badge" id="badge"></span>
        <h1 class="links-titulo">Bienvenido a la comunidad de trading <em>más exclusiva</em> de Colombia</h1>
        <p class="links-subtitulo">Todos tus canales, en un solo lugar.</p>

      <noscript>
        <p class="sin-js">
          Necesitás activar JavaScript para ver los accesos.
          Si no podés, escribinos por WhatsApp desde
          <a href="https://www.ttrading.co">ttrading.co</a> y te los pasamos.

      </noscript>

      <nav class="links-grid" id="botones" aria-label="Canales de la comunidad"></nav>

      <p class="links-nota">
        El ingreso al grupo lo aprueba un administrador.
        
      </p>

    <footer class="links-footer">
      <p class="footer__titulo">Reconocimientos</p>
      <div class="reconocimientos" id="reconocimientos"></div>
      <p class="footer__meta">
        <a href="https://www.ttrading.co" target="_blank" rel="noopener noreferrer">ttrading.co</a>
        · <span>Tactical Assets S.A.S.</span>
      </p>
    </footer>

  </div>

  <script src="/config.js"></script>
  <script src="/shared.js"></script>
  <script src="/links.js"></script>
